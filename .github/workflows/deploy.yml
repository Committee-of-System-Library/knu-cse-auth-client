name: CI/CD

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: committee-of-system-library
  IMAGE_NAME: knu-cse-auth-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build \
            --build-arg VITE_BASE_PATH=__VITE_BASE_PATH__ \
            --build-arg VITE_FRONTEND_BASE_URL=__VITE_FRONTEND_BASE_URL__ \
            --build-arg VITE_AUTH_SERVER_BASE_URL=__VITE_AUTH_SERVER_BASE_URL__ \
            --build-arg VITE_API_BASE_URL=__VITE_API_BASE_URL__ \
            -t $REGISTRY/$ORG/$IMAGE_NAME:latest \
            -t $REGISTRY/$ORG/$IMAGE_NAME:$(date +%Y%m%d%H%M%S) \
            .
          docker push $REGISTRY/$ORG/$IMAGE_NAME --all-tags

  deploy:
    needs: build-and-push
    runs-on: [ 'self-hosted', 'frontend' ]
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Pull and restart
        run: |
          docker pull $REGISTRY/$ORG/$IMAGE_NAME:latest
          docker compose -f /opt/docker/compose/compose/docker-compose.services.yml up -d sso-fe

      - name: Cleanup
        run: docker image prune -f
